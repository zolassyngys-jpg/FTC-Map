<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTC Kazakhstan Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; }
        .ui-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 220px;
        }
        .add-btn {
            display: block; background: #007bff; color: white;
            text-align: center; padding: 10px; text-decoration: none;
            border-radius: 8px; font-weight: bold; margin-top: 10px;
        }
        .team-logo-style {
            border-radius: 50%;
            border: 2px solid #007bff;
            background: white;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="ui-panel">
        <h2 style="margin:0; font-size:18px;">FTC KZ MAP</h2>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSeZcpo7Ga7OBPJLRLbIJNaTGKCAFy2l3x4N6_HaUueAWWgLjg/viewform" target="_blank" class="add-btn">Добавить команду</a>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([43.2389, 76.8897], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Прямая ссылка на лого FTC
        const ftcLogoUrl = 'https://raw.githubusercontent.com/FIRST-Tech-Challenge/ftc_app/master/doc/images/ftc_logo.png';
        const table_url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQjtR3gDUmiRfsiFki23ufThV69yij-sSlcfG1-CATeDHyAhpcH2bgEPcWz9H-0hy5Ge2p9E422f-BR/pub?gid=390633659&single=true&output=csv';

        async function loadTeams() {
            try {
                const response = await fetch(table_url + '&nocache=' + new Date().getTime());
                const data = await response.text();
                const rows = data.split('\n').slice(1); 

                rows.forEach(row => {
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (columns.length < 5) return;

                    const name = columns[1]?.replace(/"/g, '').trim();    
                    const school = columns[2]?.replace(/"/g, '').trim();  
                    const coordsRaw = columns[3]?.replace(/"/g, '').trim(); 
                    let photoLink = columns[5]?.replace(/"/g, '').trim();

                    // ТВОЯ ИДЕЯ: Если написано FTC или пусто — ставим лого
                    if (!photoLink || photoLink.toUpperCase() === "FTC" || photoLink.length < 5) {
                        photoLink = ftcLogoUrl;
                    }

                    if (coordsRaw && coordsRaw.includes(',')) {
                        const latLon = coordsRaw.split(',').map(item => parseFloat(item.trim()));
                        
                        const teamIcon = L.icon({
                            iconUrl: photoLink,
                            iconSize: [42, 42],
                            iconAnchor: [21, 21],
                            className: 'team-logo-style'
                        });

                        const popupContent = `<div style="text-align:center;">
                            <img src="${photoLink}" onerror="this.src='${ftcLogoUrl}'" style="width:50px; border-radius:50%;"><br>
                            <b>${name}</b><br>${school}</div>`;

                        L.marker(latLon, {icon: teamIcon}).addTo(map).bindPopup(popupContent);
                    }
                });
            } catch (e) { console.error(e); }
        }
        loadTeams();
    </script>
</body>
</html>
