<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTC Kazakhstan Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100%; }
        
        /* Панель управления слева */
        .ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 220px;
        }

        .add-btn {
            display: block;
            background: #007bff;
            color: white;
            text-align: center;
            padding: 10px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }

        .add-btn:hover { background: #0056b3; }

        /* Стиль для круглых логотипов команд на карте */
        .team-logo-custom {
            border-radius: 50%;
            border: 2px solid #007bff;
            background: white;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h2 style="margin:0; font-size:18px; color:#333;">FTC KZ MAP</h2>
        <p style="font-size:12px; color:#666; margin: 5px 0;">Карта команд Казахстана</p>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSeZcpo7Ga7OBPJLRLbIJNaTGKCAFy2l3x4N6_HaUueAWWgLjg/viewform" target="_blank" class="add-btn">Добавить команду</a>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Настройка центра карты (Казахстан)
        var map = L.map('map').setView([48.0196, 66.9237], 5);

        // Светлая тема карты
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Ссылка на лого FTC по умолчанию
        const ftcLogoDefault = 'https://raw.githubusercontent.com/FIRST-Tech-Challenge/ftc_app/master/doc/images/ftc_logo.png';
        
        // Твоя ссылка на CSV из Google Таблицы
        const table_url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQjtR3gDUmiRfsiFki23ufThV69yij-sSlcfG1-CATeDHyAhpcH2bgEPcWz9H-0hy5Ge2p9E422f-BR/pub?gid=390633659&single=true&output=csv';

        async function loadTeams() {
            try {
                // Загружаем данные, добавляя случайный параметр для сброса кэша
                const response = await fetch(table_url + '&t=' + Date.now());
                const data = await response.text();
                
                // Разбиваем на строки и убираем заголовок
                const rows = data.split('\n').slice(1); 

                rows.forEach(row => {
                    // Разделение строки CSV с учетом запятых внутри кавычек
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (columns.length < 5) return;

                    const name = columns[1]?.replace(/"/g, '').trim();    
                    const school = columns[2]?.replace(/"/g, '').trim();  
                    const coordsRaw = columns[3]?.replace(/"/g, '').trim(); 
                    let photo = columns[5]?.replace(/"/g, '').trim();

                    if (coordsRaw && coordsRaw.includes(',')) {
                        const latLon = coordsRaw.split(',').map(item => parseFloat(item.trim()));
                        
                        // Логика выбора иконки
                        let finalPhoto = photo;
                        if (!photo || photo.toUpperCase() === "FTC" || !photo.startsWith('http')) {
                            finalPhoto = ftcLogoDefault;
                        }

                        // Создаем маркер с логотипом
                        const teamIcon = L.icon({
                            iconUrl: finalPhoto,
                            iconSize: [40, 40],
                            iconAnchor: [20, 20],
                            className: 'team-logo-custom'
                        });

                        // Содержимое всплывающего окна
                        const popupContent = `
                            <div style="text-align:center; min-width:120px;">
                                <img src="${finalPhoto}" onerror="this.src='${ftcLogoDefault}'" style="width:50px; border-radius:50%; margin-bottom:5px;"><br>
                                <b style="font-size:14px;">${name}</b><br>
                                <span style="font-size:12px; color:#666;">${school}</span>
                            </div>
                        `;

                        L.marker(latLon, {icon: teamIcon})
                            .addTo(map)
                            .bindPopup(popupContent);
                    }
                });
            } catch (error) {
                console.error('Ошибка загрузки данных:', error);
            }
        }

        loadTeams();
    </script>
</body>
</html>
