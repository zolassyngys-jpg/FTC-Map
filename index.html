<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FTC KAZAKHSTAN MAP</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; }
        #map { height: 100vh; width: 100%; }
        .logo-style { 
            border-radius: 50% !important; 
            border: 2px solid #007bff !important; 
            background: white !important;
            object-fit: cover !important;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Создаем карту
        const map = L.map('map').setView([48.0196, 66.9237], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // 2. Ссылки (ПРОВЕРЬ ИХ)
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQjtR3gDUmiRfsiFki23ufThV69yij-sSlcfG1-CATeDHyAhpcH2bgEPcWz9H-0hy5Ge2p9E422f-BR/pub?gid=390633659&single=true&output=csv&v=' + Math.random();
        const MY_LOGO = "https://raw.githubusercontent.com/zolassynqys-jpg/FTC-Map/main/logo.jpg.jpg";

        async function loadData() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const lines = text.split('\n').slice(1);

                lines.forEach(line => {
                    const col = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g, '').trim());
                    if (col.length < 4) return;

                    let [id, name, school, coords, social, photo] = col;

                    // Если это твоя команда - ставим лого из Гитхаба без вариантов
                    if (name.toLowerCase().includes("y tech") || name.toLowerCase().includes("y-tech")) {
                        photo = MY_LOGO;
                    }

                    if (coords && coords.includes(',')) {
                        const pos = coords.split(',').map(Number);
                        const img = (photo && photo.startsWith('http')) ? photo : 'https://cdn-icons-png.flaticon.com/512/4712/4712139.png';

                        const icon = L.icon({
                            iconUrl: img,
                            iconSize: [40, 40],
                            iconAnchor: [20, 20],
                            className: 'logo-style'
                        });

                        L.marker(pos, {icon: icon}).addTo(map)
                         .bindPopup(`<b>${name}</b><br><img src="${img}" style="width:80px; height:80px; border-radius:50%; object-fit:cover;">`);
                    }
                });
            } catch (e) { console.error("Ошибка:", e); }
        }
        loadData();
    </script>
</body>
</html>
