<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FTC Kazakhstan Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f4f4f4; }
        #map { height: 100vh; width: 100%; }
        
        .ui-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 220px;
        }
        
        .add-btn {
            display: block; background: #007bff; color: white;
            text-align: center; padding: 10px; text-decoration: none;
            border-radius: 8px; font-weight: bold; margin-top: 10px;
        }

        .team-logo-style {
            border-radius: 50%;
            border: 2px solid #007bff;
            background: white;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h2 style="margin:0; font-size:18px;">FTC KZ MAP</h2>
        <p style="font-size: 12px; color: #666;">Карта команд Казахстана</p>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSeZcpo7Ga7OBPJLRLbIJNaTGKCAFy2l3x4N6_HaUueAWWgLjg/viewform" target="_blank" class="add-btn">Добавить команду</a>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([48.0196, 66.9237], 5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '©OpenStreetMap'
        }).addTo(map);

        // Твоя ссылка на CSV из Google Таблицы
        const table_url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQjtR3gDUmiRfsiFki23ufThV69yij-sSlcfG1-CATeDHyAhpcH2bgEPcWz9H-0hy5Ge2p9E422f-BR/pub?gid=390633659&single=true&output=csv';
        
        // Запасной логотип, если основной не грузится
        const defaultLogo = 'https://raw.githubusercontent.com/FIRST-Tech-Challenge/ftc_app/master/doc/images/ftc_logo.png';

        async function loadTeams() {
            try {
                const response = await fetch(table_url + '&cachebust=' + new Date().getTime());
                const data = await response.text();
                const rows = data.split('\n').slice(1); 

                rows.forEach(row => {
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (columns.length < 4) return;

                    const name = columns[1]?.replace(/"/g, '').trim();    
                    const school = columns[2]?.replace(/"/g, '').trim();  
                    const coordsRaw = columns[3]?.replace(/"/g, '').trim(); 
                    const contactLink = columns[4]?.replace(/"/g, '').trim();
                    const photoLink = columns[5]?.replace(/"/g, '').trim();

                    if (coordsRaw && coordsRaw.includes(',')) {
                        const latLon = coordsRaw.split(',').map(item => parseFloat(item.trim()));
                        
                        if (!isNaN(latLon[0]) && !isNaN(latLon[1])) {
                            // Если в таблице пусто, ставим лого FTC
                            const finalPhoto = (photoLink && photoLink.length > 10) ? photoLink : defaultLogo;

                            const teamIcon = L.icon({
                                iconUrl: finalPhoto,
                                iconSize: [40, 40],
                                iconAnchor: [20, 20],
                                popupAnchor: [0, -20],
                                className: 'team-logo-style'
                            });

                            let popupContent = `
                                <div style="text-align:center; min-width:150px;">
                                    <img src="${finalPhoto}" 
                                         onerror="this.src='${defaultLogo}'" 
                                         style="width:60px; height:60px; object-fit:contain; border-radius:50%; margin-bottom:5px;">
                                    <br><b>${name}</b><br>
                                    <span style="color:gray; font-size:12px;">${school}</span>
                            `;

                            if (contactLink && contactLink.length > 5) {
                                popupContent += `<br><br><a href="${contactLink}" target="_blank" style="background:#007bff; color:white; padding:6px 12px; text-decoration:none; border-radius:6px; display:inline-block; font-size:12px; font-weight:bold;">Связаться</a>`;
                            }
                            popupContent += `</div>`;

                            L.marker(latLon, {icon: teamIcon}).addTo(map).bindPopup(popupContent);
                        }
                    }
                });
            } catch (error) {
                console.error("Ошибка загрузки данных:", error);
            }
        }

        loadTeams();
    </script>
</body>
</html>
