<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTC Kazakhstan Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Poppins', 'Segoe UI', sans-serif; background: #f0f2f5; }
        #map { height: 100vh; width: 100%; }
        
        /* Дизайн панели управления */
        .ui-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: white; padding: 20px; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 240px;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .ui-panel h2 { margin: 0; font-size: 20px; color: #1a1a1b; letter-spacing: 1px; }
        .ui-panel p { font-size: 13px; color: #65676b; margin: 8px 0 15px; }

        .add-btn {
            display: block; background: linear-gradient(135deg, #007bff, #0056b3);
            color: white; text-align: center; padding: 12px;
            text-decoration: none; border-radius: 10px; font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .add-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,123,255,0.3); }

        /* Дизайн всплывающего окна (Popup) */
        .leaflet-popup-content-wrapper { border-radius: 12px; padding: 5px; }
        .contact-btn {
            display: inline-block; margin-top: 12px; padding: 8px 20px;
            background: #e7f3ff; color: #007bff; text-decoration: none;
            border-radius: 8px; font-size: 13px; font-weight: bold;
            transition: 0.2s;
        }
        .contact-btn:hover { background: #007bff; color: white; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h2>FTC KZ MAP</h2>
        <p>Находи команды, заводи знакомства, побеждай!</p>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSeZcpo7Ga7OBPJLRLbIJNaTGKCAFy2l3x4N6_HaUueAWWgLjg/viewform" target="_blank" class="add-btn">Добавить команду</a>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map', { zoomControl: false }).setView([48.0196, 66.9237], 5);
        
        // Добавляем кнопки зума в правый нижний угол, чтобы не мешали панели
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQjtR3gDUmiRfsiFki23ufThV69yij-sSlcfG1-CATeDHyAhpcH2bgEPcWz9H-0hy5Ge2p9E422f-BR/pub?gid=390633659&single=true&output=csv';

        async function loadData() {
            try {
                const response = await fetch(CSV_URL + '&t=' + Date.now());
                const text = await response.text();
                const rows = text.split('\n').slice(1);

                rows.forEach(row => {
                    const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g, '').trim());
                    if (col.length < 4) return;

                    const name = col[1];
                    const school = col[2];
                    const coords = col[3];
                    const social = col[4]; // Колонка E

                    if (coords && coords.includes(',')) {
                        const pos = coords.split(',').map(Number);

                        // Кнопка связи
                        let btnHtml = '';
                        if (social && social.startsWith('http')) {
                            btnHtml = `<br><a href="${social}" target="_blank" class="contact-btn">Связаться</a>`;
                        }

                        const content = `
                            <div style="text-align:center; padding: 5px;">
                                <b style="font-size:16px; color:#1a1a1b;">${name}</b><br>
                                <span style="color:#65676b; font-size:13px;">${school}</span>
                                ${btnHtml}
                            </div>
                        `;

                        // Используем стандартный маркер (синяя точка)
                        L.marker(pos).addTo(map).bindPopup(content);
                    }
                });
            } catch (err) { console.error(err); }
        }
        loadData();
    </script>
</body>
</html>
