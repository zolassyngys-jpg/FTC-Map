<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTC Kazakhstan Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; }
        .ui-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 220px;
        }
        .add-btn {
            display: block; background: #007bff; color: white;
            text-align: center; padding: 10px; text-decoration: none;
            border-radius: 8px; font-weight: bold; margin-top: 10px;
        }
        .team-logo-circle {
            border-radius: 50%; border: 2px solid #007bff;
            background: white; object-fit: cover;
        }
        .contact-link {
            display: inline-block; margin-top: 10px; padding: 8px 12px;
            background: #007bff; color: white; text-decoration: none;
            border-radius: 6px; font-size: 12px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h2 style="margin:0; font-size:18px;">FTC KZ MAP</h2>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSeZcpo7Ga7OBPJLRLbIJNaTGKCAFy2l3x4N6_HaUueAWWgLjg/viewform" target="_blank" class="add-btn">Добавить команду</a>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- КОНСТАНТЫ ---
        const DEFAULT_LOGO = 'https://raw.githubusercontent.com/FIRST-Tech-Challenge/ftc_app/master/doc/images/ftc_logo.png';
        const TABLE_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQjtR3gDUmiRfsiFki23ufThV69yij-sSlcfG1-CATeDHyAhpcH2bgEPcWz9H-0hy5Ge2p9E422f-BR/pub?gid=390633659&single=true&output=csv';

        var map = L.map('map').setView([48.0196, 66.9237], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        async function loadData() {
            try {
                const response = await fetch(TABLE_CSV + '&cache=' + Date.now());
                const text = await response.text();
                const rows = text.split('\n').slice(1);

                rows.forEach(row => {
                    const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g, '').trim());
                    
                    if (col.length < 4) return;

                    const name = col[1];
                    const school = col[2];
                    const coords = col[3];
                    const link = col[4]; // Колонка E (Связаться)
                    const photo = col[5]; // Колонка F (Лого)

                    if (coords && coords.includes(',')) {
                        const pos = coords.split(',').map(Number);

                        // ПРОВЕРКА ЛОГОТИПА: Если в таблице пусто или короткий текст типа "FTC"
                        let finalImg = (photo && photo.startsWith('http')) ? photo : DEFAULT_LOGO;

                        const icon = L.icon({
                            iconUrl: finalImg,
                            iconSize: [40, 40],
                            iconAnchor: [20, 20],
                            className: 'team-logo-circle'
                        });

                        // КНОПКА СВЯЗАТЬСЯ: Создаем только если ссылка начинается на http
                        let btnHtml = '';
                        if (link && link.startsWith('http')) {
                            btnHtml = `<br><a href="${link}" target="_blank" class="contact-link">Связаться</a>`;
                        }

                        const content = `
                            <div style="text-align:center;">
                                <img src="${finalImg}" onerror="this.src='${DEFAULT_LOGO}'" style="width:50px; border-radius:50%;"><br>
                                <b>${name}</b><br><small>${school}</small>
                                ${btnHtml}
                            </div>
                        `;

                        L.marker(pos, {icon: icon}).addTo(map).bindPopup(content);
                    }
                });
            } catch (err) { console.error(err); }
        }
        loadData();
    </script>
</body>
</html>
