<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTC Kazakhstan Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; }
        .ui-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); width: 220px;
        }
        .add-btn {
            display: block; background: #007bff; color: white;
            text-align: center; padding: 10px; text-decoration: none;
            border-radius: 8px; font-weight: bold; margin-top: 10px;
        }
        /* Стиль круглых иконок */
        .team-logo-custom {
            border-radius: 50%; border: 2px solid #007bff;
            background: white; object-fit: cover;
        }
        .contact-btn {
            display: inline-block; margin-top: 10px; padding: 8px 15px;
            background: #e7f3ff; color: #007bff; text-decoration: none;
            border-radius: 8px; font-size: 13px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="ui-panel">
        <h2 style="margin:0; font-size:18px;">FTC KZ MAP</h2>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSeZcpo7Ga7OBPJLRLbIJNaTGKCAFy2l3x4N6_HaUueAWWgLjg/viewform" target="_blank" class="add-btn">Добавить команду</a>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([48.0196, 66.9237], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Лого FTC по умолчанию
        const defaultLogo = 'https://raw.githubusercontent.com/FIRST-Tech-Challenge/ftc_app/master/doc/images/ftc_logo.png';
        const table_url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQjtR3gDUmiRfsiFki23ufThV69yij-sSlcfG1-CATeDHyAhpcH2bgEPcWz9H-0hy5Ge2p9E422f-BR/pub?gid=390633659&single=true&output=csv';

        async function loadTeams() {
            try {
                const response = await fetch(table_url + '&t=' + Date.now());
                const data = await response.text();
                const rows = data.split('\n').slice(1); 

                rows.forEach(row => {
                    // Чистим данные от кавычек
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                    
                    if (columns.length < 4) return;

                    const name = columns[1];    
                    const school = columns[2];  
                    const coordsRaw = columns[3]; 
                    const socialLink = columns[4]; // Колонка E
                    const photo = columns[5];      // Колонка F

                    if (coordsRaw && coordsRaw.includes(',')) {
                        const latLon = coordsRaw.split(',').map(item => parseFloat(item.trim()));
                        
                        // Если фото пустое или равно "FTC", ставим стандартное лого
                        let finalPhoto = (photo && photo.length > 5 && photo.startsWith('http')) ? photo : defaultLogo;

                        const teamIcon = L.icon({
                            iconUrl: finalPhoto,
                            iconSize: [40, 40],
                            iconAnchor: [20, 20],
                            className: 'team-logo-custom'
                        });

                        // Проверяем наличие ссылки для кнопки
                        let contactBtn = '';
                        if (socialLink && socialLink.startsWith('http')) {
                            contactBtn = `<br><a href="${socialLink}" target="_blank" class="contact-btn">Связаться</a>`;
                        }

                        const popup = `<div style="text-align:center; min-width:150px;">
                            <img src="${finalPhoto}" onerror="this.src='${defaultLogo}'" style="width:50px; height:50px; border-radius:50%; object-fit:cover;"><br>
                            <b style="font-size:16px;">${name}</b><br>
                            <span style="color:gray;">${school}</span>
                            ${contactBtn}
                        </div>`;

                        L.marker(latLon, {icon: teamIcon}).addTo(map).bindPopup(popup);
                    }
                });
            } catch (e) { console.error("Ошибка:", e); }
        }
        loadTeams();
    </script>
</body>
</html>
