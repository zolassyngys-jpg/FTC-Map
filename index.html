<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTC Kazakhstan Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ftc-red: #ed1c24;
            --ftc-cream: #f5f5dc;
            --primary: #007bff;
            --glass: rgba(15, 15, 20, 0.85);
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #0b0e11; }

        /* Красно-молочные линии */
        .border-line {
            position: absolute; left: 0; width: 100%; height: 6px;
            background: repeating-linear-gradient(90deg, var(--ftc-red), var(--ftc-red) 50px, var(--ftc-cream) 50px, var(--ftc-cream) 100px);
            z-index: 2000; box-shadow: 0 0 15px rgba(237, 28, 36, 0.4);
        }
        .top-line { top: 0; }
        .bottom-line { bottom: 0; }

        /* Инфо-бары в углах */
        .corner-info {
            position: absolute; z-index: 2000; top: 15px;
            padding: 10px 20px; background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px); border-radius: 10px;
            font-family: 'Orbitron', sans-serif; color: white;
        }
        .left-top { left: 20px; color: var(--primary); font-size: 18px; border-left: 4px solid var(--primary); }
        .right-top { right: 20px; text-align: right; border-right: 4px solid var(--ftc-red); }

        /* Основная панель */
        .ui-panel {
            position: absolute; bottom: 40px; left: 20px; z-index: 1000;
            background: var(--glass); backdrop-filter: blur(12px);
            padding: 20px; border-radius: 15px; width: 240px;
            border: 1px solid rgba(255,255,255,0.1); color: white;
        }
        .add-btn {
            display: block; background: var(--primary); color: white;
            text-align: center; padding: 10px; text-decoration: none;
            border-radius: 8px; font-weight: bold; margin-top: 10px;
            transition: 0.3s;
        }
        .add-btn:hover { filter: brightness(1.2); transform: scale(1.02); }

        /* Маркеры */
        .team-logo-marker {
            border-radius: 50%; border: 2px solid var(--primary);
            background: white; box-shadow: 0 0 15px var(--primary);
        }
    </style>
</head>
<body>

    <div class="border-line top-line"></div>
    
    <div class="corner-info left-top">FTC</div>
    <div class="corner-info right-top">
        <div style="font-size: 14px; color: var(--ftc-red);">Y tech</div>
        <div style="font-size: 10px; letter-spacing: 1px;">#29112</div>
    </div>

    <div class="ui-panel">
        <h3 style="margin:0; font-family: 'Orbitron'; font-size: 14px;">TEAM LOCATOR</h3>
        <p style="font-size: 11px; color: #aaa;">Найди союзников по всему Казахстану</p>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSeZcpo7Ga7OBPJLRLbIJNaTGKCAFy2l3x4N6_HaUueAWWgLjg/viewform" target="_blank" class="add-btn">Вступить в базу</a>
    </div>

    <div id="map"></div>
    <div class="border-line bottom-line"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Границы Казахстана, чтобы карта не уходила далеко
        const kzBounds = L.latLngBounds(
            L.latLng(40.0, 45.0), // Юго-запад
            L.latLng(56.0, 88.0)  // Северо-восток
        );

        const map = L.map('map', {
            zoomControl: false,
            maxBounds: kzBounds,      // Ограничиваем область
            maxBoundsViscosity: 1.0,  // "Упругость" границ
            minZoom: 4
        }).setView([48.0196, 66.9237], 5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQjtR3gDUmiRfsiFki23ufThV69yij-sSlcfG1-CATeDHyAhpcH2bgEPcWz9H-0hy5Ge2p9E422f-BR/pub?gid=390633659&single=true&output=csv';
        const DEFAULT_ROBOT = 'https://cdn-icons-png.flaticon.com/512/4712/4712139.png';

        async function loadTeams() {
            try {
                const response = await fetch(CSV_URL + '&t=' + Date.now());
                const data = await response.text();
                const rows = data.split('\n').slice(1);

                rows.forEach(row => {
                    const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(s => s.replace(/"/g, '').trim());
                    if (col.length < 4) return;

                    const name = col[1], school = col[2], coords = col[3], social = col[4], photo = col[5];

                    if (coords && coords.includes(',')) {
                        const pos = coords.split(',').map(Number);
                        let imgUrl = (photo && photo.startsWith('http')) ? photo : DEFAULT_ROBOT;

                        const icon = L.icon({
                            iconUrl: imgUrl,
                            iconSize: [40, 40],
                            iconAnchor: [20, 20],
                            className: 'team-logo-marker'
                        });

                        const popupHtml = `
                            <div style="text-align:center; color: #333;">
                                <img src="${imgUrl}" onerror="this.src='${DEFAULT_ROBOT}'" style="width:40px; border-radius:50%; border:2px solid var(--primary);"><br>
                                <b>${name}</b><br><small>${school}</small>
                                ${(social && social.startsWith('http')) ? `<br><a href="${social}" target="_blank" style="color:var(--primary); text-decoration:none; font-weight:bold;">Instagram/TG</a>` : ''}
                            </div>
                        `;

                        L.marker(pos, { icon: icon }).addTo(map).bindPopup(popupHtml);
                    }
                });
            } catch (err) { console.error(err); }
        }
        loadTeams();
    </script>
</body>
</html>
